version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shopping-mall-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: shoppingmall
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shopping-mall-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: shopping-mall-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_NAME: shoppingmall
      DB_USERNAME: appuser
      DB_PASSWORD: apppassword
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-environment}
    ports:
      - "8080:8080"

volumes:
  mysql-data:
  redis-data:
